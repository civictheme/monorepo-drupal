$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Basic Content
status: stable
description: Component for general HTML content with configurable container options
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    is_contained:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Contained
      description: Whether to wrap the content in a container.
      default: true
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical spacing
      description: Vertical spacing position (top, bottom, both).
      enum:
      - top
      - bottom
      - both
      - ''
      - null
    with_background:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: With background
      description: Whether to display with a background.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
slots:
  content:
    title: Content
    description: HTML content.
libraryOverrides:
  dependencies:
  - core/components.civictheme--table
