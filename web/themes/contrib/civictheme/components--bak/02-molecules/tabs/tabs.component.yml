$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Tabs
status: stable
description: Component for tabbed content
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical Spacing
      description: Vertical spacing for the tabs (none, top, bottom, both).
      enum:
      - none
      - top
      - bottom
      - both
      - ''
      - null
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier Class
      description: Additional CSS classes.
    panels:
      type: array
      title: Panels
      description: Tab panels.
      items:
        type: object
        properties:
          title:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Title
            description: Panel title.
          content:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Content
            description: Panel content.
          id:
            type:
            - string
            - 'null'
            - integer
            - object
            title: ID
            description: Panel ID.
          is_selected:
            type:
            - boolean
            - 'null'
            - string
            - integer
            title: Selected
            description: Whether the panel is selected.
    links:
      type: array
      title: Links
      description: Optional links (if not provided - will be generated from panels).
      items:
        type: object
        properties:
          text:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Text
            description: Link text.
          url:
            type:
            - string
            - 'null'
            - integer
            - object
            title: URL
            description: Link URL.
          modifier_class:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Modifier Class
            description: Additional CSS classes.
          attributes:
            type: object
            title: Attributes
            description: Additional HTML attributes.
