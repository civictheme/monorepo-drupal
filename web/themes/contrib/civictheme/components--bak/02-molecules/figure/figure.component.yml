$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Figure
status: stable
description: Component for displaying images with optional captions
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
    url:
      type:
      - string
      - 'null'
      - integer
      title: URL
      description: Image URL.
    alt:
      type:
      - string
      - 'null'
      - integer
      title: Alt text
      description: Image alt text.
    width:
      type:
      - string
      - 'null'
      - integer
      title: Width
      description: Image width.
    height:
      type:
      - string
      - 'null'
      - integer
      title: Height
      description: Image height.
slots:
  caption:
    title: Caption
    description: Image caption.
