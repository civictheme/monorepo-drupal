$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Item List
status: stable
description: A list component that can display items horizontally or vertically
props:
  type: object
  properties:
    direction:
      type:
      - string
      - 'null'
      - integer
      title: Direction
      description: List direction (horizontal or vertical).
      enum:
      - horizontal
      - vertical
      - ''
      - null
      default: horizontal
    size:
      type:
      - string
      - 'null'
      - integer
      title: Size
      description: List size (large, regular, or small).
      enum:
      - large
      - regular
      - small
      - ''
      - null
      default: regular
    no_gap:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: No gap
      description: Whether to render without gaps.
    items:
      type: array
      title: Items
      description: List items.
      items:
        type: [string, 'null', integer, object]
        description: HTML content for each list item.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
