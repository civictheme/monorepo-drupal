$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Layout
status: stable
description: Layout component for creating responsive page layouts with sidebars
props:
  type: object
  properties:
    hide_sidebar_left:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Hide left sidebar
      description: Whether to hide the left sidebar.
    hide_sidebar_right:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Hide right sidebar
      description: Whether to hide the right sidebar.
    is_contained:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Is contained
      description: Whether the page content should be contained.
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical spacing
      description: Controls vertical spacing (top, bottom, or both).
      enum:
      - top
      - bottom
      - both
      - ''
      - null
    content_attributes:
      type:
      - object
      - 'null'
      - string
      - integer
      title: Content attributes
      description: Additional HTML attributes for the main content section.
    sidebar_top_left_attributes:
      type:
      - object
      - 'null'
      - string
      - integer
      title: Sidebar top left attributes
      description: Additional HTML attributes for the top left sidebar.
    sidebar_top_right_attributes:
      type:
      - object
      - 'null'
      - string
      - integer
      title: Sidebar top right attributes
      description: Additional HTML attributes for the top right sidebar.
    sidebar_bottom_left_attributes:
      type:
      - object
      - 'null'
      - string
      - integer
      title: Sidebar bottom left attributes
      description: Additional HTML attributes for the bottom left sidebar.
    sidebar_bottom_right_attributes:
      type:
      - object
      - 'null'
      - string
      - integer
      title: Sidebar bottom right attributes
      description: Additional HTML attributes for the bottom right sidebar.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
slots:
  content_top:
    title: Content Top
    description: Main content area top content.
  sidebar_top_left:
    title: Sidebar Top Left
    description: Top left sidebar content.
  sidebar_top_right:
    title: Sidebar Top Right
    description: Top right sidebar content.
  content:
    title: Content
    description: Main content.
  sidebar_bottom_left:
    title: Sidebar Bottom Left
    description: Bottom left sidebar content.
  sidebar_bottom_right:
    title: Sidebar Bottom Right
    description: Bottom right sidebar content.
  content_bottom:
    title: Content Bottom
    description: Main content area bottom content.
