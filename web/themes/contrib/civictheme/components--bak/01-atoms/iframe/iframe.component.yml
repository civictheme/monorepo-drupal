$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Iframe
status: stable
description: Component for iframe embedded external content
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    url:
      type:
      - string
      - 'null'
      - integer
      title: URL
      description: Iframe URL.
    width:
      type:
      - integer
      - string
      - 'null'
      title: Width
      description: Iframe width.
    height:
      type:
      - integer
      - string
      - 'null'
      title: Height
      description: Iframe height.
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical spacing
      description: Vertical spacing position (top, bottom, both).
      enum:
      - top
      - bottom
      - both
      - ''
      - null
    with_background:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: With background
      description: Whether to include a background.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
