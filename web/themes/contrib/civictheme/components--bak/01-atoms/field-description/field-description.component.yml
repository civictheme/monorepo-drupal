$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Field Description
status: stable
description: Component for form field description text
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    content:
      type:
      - string
      - 'null'
      - integer
      title: Content
      description: The description's content.
    size:
      type:
      - string
      - 'null'
      - integer
      title: Size
      description: Description size (large, regular).
      enum:
      - large
      - regular
      - ''
      - null
      default: regular
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
