$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Select
status: stable
description: Select dropdown form element with customizable options and states
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    id:
      type:
      - string
      - 'null'
      - integer
      title: ID
      description: DOM ID attribute.
    name:
      type:
      - string
      - 'null'
      - integer
      title: Name
      description: DOM name (required).
    is_multiple:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Multiple
      description: Whether to allow multiple selections.
    options:
      type: array
      title: Options
      description: Options (applies to optgroup type)
      items:
        type: object
        properties:
          type:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Type
            description: Option type (option group or option).
            enum:
            - optgroup
            - option
          label:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Label
            description: Option label.
          value:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Value
            description: Option value.
          is_selected:
            type:
            - boolean
            - 'null'
            - string
            - integer
            title: Selected
            description: Whether the option is selected.
          is_disabled:
            type:
            - boolean
            - 'null'
            - string
            - integer
            title: Disabled
            description: Whether the select is disabled.
          options:
            type: array
            title: Nested options
            description: Options (applies to optgroup type)
            items:
              type: object
              properties:
                label:
                  type:
                  - string
                  - 'null'
                  - integer
                  - object
                  title: Label
                  description: Option label.
                value:
                  type:
                  - string
                  - 'null'
                  - integer
                  - object
                  title: Value
                  description: Option value.
                is_selected:
                  type:
                  - boolean
                  - 'null'
                  - string
                  - integer
                  title: Selected
                  description: Whether the option is selected.
                is_disabled:
                  type:
                  - boolean
                  - 'null'
                  - string
                  - integer
                  title: Disabled
                  description: Whether the select is disabled.
    is_invalid:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Invalid
      description: Whether the select is invalid.
    is_disabled:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Disabled
      description: Whether the select is disabled.
    is_required:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Required
      description: Whether the select is required.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
