$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Fieldset
status: stable
description: Fieldset component for grouping form elements with legend and description
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    legend:
      type:
      - string
      - 'null'
      - integer
      title: Legend
      description: Legend for the fieldset.
    description:
      type:
      - string
      - 'null'
      - integer
      title: Description
      description: Description for the fieldset.
    description_display:
      type:
      - string
      - 'null'
      - integer
      title: Description display
      description: Description display position (before, after, invisible).
      enum:
      - before
      - after
      - invisible
      - ''
      - null
      default: before
    message:
      type:
      - string
      - 'null'
      - integer
      title: Message
      description: Message content.
    message_type:
      type:
      - string
      - 'null'
      - integer
      title: Message type
      description: Message type (error, information, warning, success).
      enum:
      - error
      - information
      - warning
      - success
      - ''
      - null
      default: error
    is_required:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Required
      description: Whether the fieldset is required.
    required_text:
      type:
      - string
      - 'null'
      - integer
      title: Required text
      description: Text to display within label element when required.
    prefix:
      type:
      - string
      - 'null'
      - integer
      title: Prefix
      description: The content to add before the fieldset children.
    suffix:
      type:
      - string
      - 'null'
      - integer
      title: Suffix
      description: The content to add after the fieldset children.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
slots:
  fields:
    title: Fields
    description: Fields content.
