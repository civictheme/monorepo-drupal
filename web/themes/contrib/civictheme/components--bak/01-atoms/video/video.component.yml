$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Video
status: stable
description: HTML5 video component with multiple source and configuration options
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    title:
      type:
      - string
      - 'null'
      - integer
      title: Title
      description: Video title.
    has_controls:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: Controls
      description: Whether the video should have controls.
    sources:
      type: array
      title: Sources
      description: Video sources.
      items:
        type: object
        properties:
          url:
            type:
            - string
            - 'null'
            - integer
            - object
            title: URL
            description: Source URL.
          type:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Type
            description: MIME type (like 'video/mp4').
    poster:
      type:
      - string
      - 'null'
      - integer
      title: Poster
      description: Video poster URL.
    width:
      type:
      - string
      - 'null'
      - integer
      title: Width
      description: Video width.
    height:
      type:
      - string
      - 'null'
      - integer
      title: Height
      description: Video height.
    fallback_text:
      type:
      - string
      - 'null'
      - integer
      title: Fallback text
      description: Message for browsers not supporting HTML5 video.
      default: Your browser doesn't support HTML5 video.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
