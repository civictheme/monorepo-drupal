$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Content Link
status: stable
description: Link component with text content and configurable states
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    text:
      type:
      - string
      - 'null'
      - integer
      title: Text
      description: Link text.
    url:
      type:
      - string
      - 'null'
      - integer
      title: URL
      description: Link URL.
    title:
      type:
      - string
      - 'null'
      - integer
      title: Title
      description: Link title.
    is_new_window:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: New window
      description: Whether to open in a new window.
    is_external:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: External link
      description: Whether the link is external.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
