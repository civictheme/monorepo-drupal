$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Side Navigation
status: stable
description: Side navigation component for vertical navigation menu
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical Spacing
      description: Navigation vertical spacing (top, bottom, or both).
      enum:
      - top
      - bottom
      - both
      - ''
      - null
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier Class
      description: Additional CSS classes.
    items:
      type: array
      title: Items
      description: Menu items.
      items:
        type: object
        properties:
          title:
            type:
            - string
            - 'null'
            - integer
            - object
            title: Title
            description: Navigation title.
          url:
            type:
            - string
            - 'null'
            - integer
            - object
            title: URL
            description: Menu item URL.
          in_active_trail:
            type:
            - boolean
            - 'null'
            - string
            - integer
            title: In Active Trail
            description: Whether the item is in the active trail.
          is_expanded:
            type:
            - boolean
            - 'null'
            - string
            - integer
            title: Is Expanded
            description: Whether the item is expanded.
          below:
            type: array
            title: Below
            description: Submenu items.
slots:
  title:
    title: Title
    description: Navigation title.
