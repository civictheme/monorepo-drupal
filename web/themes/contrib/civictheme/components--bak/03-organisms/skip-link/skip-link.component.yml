$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Skip Link
status: experimental
description: Skip Link component for accessibility navigation
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
      default: light
    text:
      type:
      - string
      - 'null'
      - integer
      title: Text
      description: Link text.
      default: Skip to main content
    url:
      type:
      - string
      - 'null'
      - integer
      title: URL
      description: Link URL.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier classes
      description: Additional CSS classes.
