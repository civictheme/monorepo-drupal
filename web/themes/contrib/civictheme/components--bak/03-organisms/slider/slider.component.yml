$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Slider
status: stable
description: Content carousel slider component
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    previous_label:
      type:
      - string
      - 'null'
      - integer
      title: Previous Label
      description: Text for previous button.
      default: Previous
    next_label:
      type:
      - string
      - 'null'
      - integer
      title: Next Label
      description: Text for next button.
      default: Next
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical Spacing
      description: Slider vertical spacing (top, bottom, or both).
      enum:
      - top
      - bottom
      - both
      - ''
      - null
    with_background:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: With Background
      description: Whether to display with a background.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier Class
      description: Additional CSS classes.
    slides:
      type:
      - string
      - 'null'
      - integer
      title: Slides
      description: Slides HTML content.
slots:
  content_top:
    title: Content Top
    description: Top content.
  title:
    title: Title
    description: Slider title.
  content_bottom:
    title: Content Bottom
    description: Bottom content.
