$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Message
status: stable
description: Message component for various notification types
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    type:
      type:
      - string
      - 'null'
      - integer
      title: Type
      description: Message type (information, error, warning, success).
      enum:
      - information
      - error
      - warning
      - success
      - ''
      - null
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical Spacing
      description: Message vertical spacing (none, top, bottom, both).
      enum:
      - none
      - top
      - bottom
      - both
      - ''
      - null
    with_background:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: With background
      description: Whether to display with a background.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier Class
      description: Additional CSS classes.
slots:
  title:
    title: Title
    description: Title text.
  content:
    title: Content
    description: Content text.
