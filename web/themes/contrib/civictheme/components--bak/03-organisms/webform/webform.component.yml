$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Webform
status: stable
description: Drupal webforms component with styling
props:
  type: object
  properties:
    theme:
      type:
      - string
      - 'null'
      - integer
      title: Theme
      description: Theme variation (light or dark).
      enum:
      - light
      - dark
      - ''
      - null
    vertical_spacing:
      type:
      - string
      - 'null'
      - integer
      title: Vertical Spacing
      description: Webform vertical spacing (top, bottom, or both).
      enum:
      - top
      - bottom
      - both
      - ''
      - null
    with_background:
      type:
      - boolean
      - 'null'
      - string
      - integer
      title: With Background
      description: Whether to display with a background.
    modifier_class:
      type:
      - string
      - 'null'
      - integer
      title: Modifier Class
      description: Additional CSS classes.
slots:
  referenced_webform:
    title: Referenced Webform
    description: Rendered webform HTML.
